<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6336909015716099"
     crossorigin="anonymous"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Recognizer</title>
    <style>
        :root {
            color-scheme: light;
            --bg-main: linear-gradient(135deg, #fff7ed 0%, #fde68a 45%, #fca5a5 100%);
            --bg-accent: radial-gradient(circle at top, rgba(255, 255, 255, 0.72), transparent 42%);
            --panel: rgba(255, 255, 255, 0.72);
            --panel-strong: rgba(255, 255, 255, 0.9);
            --text-main: #172033;
            --text-muted: #52607a;
            --border: rgba(255, 255, 255, 0.56);
            --shadow: 0 24px 60px rgba(168, 85, 247, 0.18);
            --hero-shadow: 0 14px 34px rgba(251, 146, 60, 0.22);
            --primary: #111827;
            --secondary: rgba(255, 255, 255, 0.72);
            --chip-active-bg: #111827;
            --chip-active-text: #ffffff;
            --bar-bg: rgba(0, 0, 0, 0.05);
            --bar-fill: linear-gradient(90deg, #f59e0b, #ef4444);
        }

        html[data-theme="dark"] {
            color-scheme: dark;
            --bg-main: linear-gradient(135deg, #020617 0%, #172554 48%, #312e81 100%);
            --bg-accent: radial-gradient(circle at top, rgba(56, 189, 248, 0.22), transparent 42%);
            --panel: rgba(15, 23, 42, 0.78);
            --panel-strong: rgba(15, 23, 42, 0.92);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(148, 163, 184, 0.18);
            --shadow: 0 24px 60px rgba(2, 6, 23, 0.48);
            --hero-shadow: 0 16px 44px rgba(56, 189, 248, 0.12);
            --primary: #f8fafc;
            --secondary: rgba(30, 41, 59, 0.72);
            --chip-active-bg: #f8fafc;
            --chip-active-text: #0f172a;
            --bar-bg: rgba(255, 255, 255, 0.1);
            --bar-fill: linear-gradient(90deg, #38bdf8, #818cf8);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
            font-family: "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            color: var(--text-main);
            background: var(--bg-accent), var(--bg-main);
            transition: background 0.35s ease, color 0.25s ease;
        }

        .shell {
            width: min(100%, 1000px);
            padding: 28px;
            border: 1px solid var(--border);
            border-radius: 28px;
            background: var(--panel);
            backdrop-filter: blur(22px);
            box-shadow: var(--shadow);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .title-area h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
        }

        .theme-switcher {
            display: inline-flex;
            gap: 8px;
            padding: 6px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: var(--panel-strong);
        }

        .theme-chip {
            min-width: 80px;
            padding: 8px 12px;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            background: transparent;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        .theme-chip[aria-pressed="true"] {
            background: var(--chip-active-bg);
            color: var(--chip-active-text);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .card {
            padding: 24px;
            border-radius: 24px;
            border: 1px solid var(--border);
            background: var(--panel-strong);
            box-shadow: var(--hero-shadow);
            display: flex;
            flex-direction: column;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            padding: 6px 12px;
            border-radius: 999px;
            background: var(--secondary);
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        /* 웹캠 영역 */
        #webcam-container {
            width: 100%;
            aspect-ratio: 1;
            background: #111;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        .start-prompt {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.4);
            color: white;
            z-index: 5;
            text-align: center;
            padding: 20px;
        }

        .start-button {
            padding: 14px 28px;
            border-radius: 12px;
            border: none;
            background: white;
            color: black;
            font-weight: 800;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s ease;
            margin-bottom: 12px;
        }

        .start-button:hover {
            transform: scale(1.05);
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 10;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* 결과 대시보드 */
        .prediction-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 8px;
        }

        .prediction-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .prediction-label {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 15px;
        }

        .prediction-bar-container {
            width: 100%;
            height: 12px;
            background: var(--bar-bg);
            border-radius: 999px;
            overflow: hidden;
        }

        .prediction-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--bar-fill);
            border-radius: 999px;
            transition: width 0.2s ease-out;
        }

        .top-prediction-highlight {
            margin-top: auto;
            padding: 20px;
            border-radius: 16px;
            background: var(--secondary);
            text-align: center;
        }

        .top-prediction-highlight span {
            display: block;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .top-prediction-highlight strong {
            font-size: 1.5rem;
            color: var(--text-main);
        }

        @media (max-width: 850px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <main class="shell">
        <header class="header">
            <div class="title-area">
                <div class="eyebrow">AI VISION SERVICE</div>
                <h1>Face Recognizer</h1>
            </div>
            <div class="theme-switcher" role="group" aria-label="테마 전환">
                <button type="button" class="theme-chip" data-theme-option="light" aria-pressed="true">Light</button>
                <button type="button" class="theme-chip" data-theme-option="dark" aria-pressed="false">Dark</button>
            </div>
        </header>

        <div class="main-grid">
            <section class="card">
                <div class="eyebrow">LIVE CAMERA</div>
                <div id="webcam-container">
                    <div class="start-prompt" id="start-prompt">
                        <button type="button" class="start-button" onclick="init()">웹캠 시작하기</button>
                        <p style="font-size: 13px; opacity: 0.8;">카메라 권한 허용이 필요합니다.</p>
                    </div>
                    <div class="loading-overlay" id="loading-overlay">
                        <div class="spinner"></div>
                        <p id="loading-text">모델 로드 중...</p>
                    </div>
                </div>
                <p style="margin: 16px 0 0; font-size: 14px; color: var(--text-muted); line-height: 1.5;">
                    인공지능 모델이 실시간으로 얼굴을 구분합니다.
                </p>
            </section>

            <section class="card">
                <div class="eyebrow">ANALYSIS RESULT</div>
                <div class="prediction-list" id="label-container">
                    <!-- 예측 결과 동적 생성 -->
                </div>
                <div class="top-prediction-highlight">
                    <span>가장 일치하는 결과</span>
                    <strong id="top-prediction-text">분석 전</strong>
                </div>
            </section>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script>
        // 테마 관리
        const html = document.documentElement;
        const themeButtons = document.querySelectorAll("[data-theme-option]");
        function setTheme(theme) {
            html.dataset.theme = theme;
            localStorage.setItem("face-recognizer-theme", theme);
            themeButtons.forEach(btn => btn.setAttribute("aria-pressed", String(btn.dataset.themeOption === theme)));
        }
        themeButtons.forEach(btn => btn.addEventListener("click", () => setTheme(btn.dataset.themeOption)));
        setTheme(localStorage.getItem("face-recognizer-theme") || "light");

        // Teachable Machine 로직 (제공해주신 코드 통합)
        const URL = "https://teachablemachine.withgoogle.com/models/DvudTMBLc/";
        let model, webcam, labelContainer, maxPredictions;
        const loadingOverlay = document.getElementById('loading-overlay');
        const startPrompt = document.getElementById('start-prompt');
        const topPredictionText = document.getElementById('top-prediction-text');

        async function init() {
            startPrompt.style.display = 'none';
            loadingOverlay.style.display = 'flex';
            
            try {
                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";

                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                const flip = true;
                webcam = new tmImage.Webcam(400, 400, flip);
                await webcam.setup();
                await webcam.play();
                window.requestAnimationFrame(loop);

                document.getElementById("webcam-container").appendChild(webcam.canvas);
                labelContainer = document.getElementById("label-container");
                
                labelContainer.innerHTML = ''; // 초기화
                for (let i = 0; i < maxPredictions; i++) {
                    const item = document.createElement("div");
                    item.className = "prediction-item";
                    item.innerHTML = `
                        <div class="prediction-label">
                            <span class="class-name">...</span>
                            <span class="class-prob">0%</span>
                        </div>
                        <div class="prediction-bar-container">
                            <div class="prediction-bar-fill"></div>
                        </div>
                    `;
                    labelContainer.appendChild(item);
                }

                loadingOverlay.style.display = 'none';
            } catch (error) {
                console.error(error);
                document.getElementById('loading-text').innerText = "오류: " + error.message;
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            let topClass = "";
            let maxProb = -1;

            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction = prediction[i].className;
                const prob = prediction[i].probability;
                const percent = Math.round(prob * 100);

                const item = labelContainer.childNodes[i];
                if (item) {
                    item.querySelector('.class-name').innerText = classPrediction;
                    item.querySelector('.class-prob').innerText = percent + "%";
                    item.querySelector('.prediction-bar-fill').style.width = percent + "%";
                }

                if (prob > maxProb) {
                    maxProb = prob;
                    topClass = classPrediction;
                }
            }
            topPredictionText.innerText = maxProb > 0.1 ? topClass : "분석 중...";
        }
    </script>
</body>
</html>
